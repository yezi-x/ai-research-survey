async function saveResponseToSupabase(participantId, submission) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/responses", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=minimal",
    },
    body: JSON.stringify({
      participant_id: participantId,
      submitted_at: submission.submittedAt,
      data: submission,
    }),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error("Supabase insert failed: " + res.status + " " + txt);
  }
  return true;
}

async function loadResponsesFromSupabase() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/responses?select=data&order=submitted_at.desc",
    {
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      },
    }
  );
  if (!res.ok) {
    const txt = await res.text();
    throw new Error("Supabase load failed: " + res.status + " " + txt);
  }
  const rows = await res.json();
  // Each row has a "data" jsonb column containing the full submission object
  return rows.map((row) => row.data);
}

function ResearchApp() {
  const [step, setStep] = useState("consent");
  const [answers, setAnswers] = useState({});
  const [isAdmin, setIsAdmin] = useState(false);

  // Load Pretendard font + check for admin mode
  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css";
    document.head.appendChild(link);

    // Set viewport meta to prevent iOS Safari from leaving the page zoomed in
    // after focusing an input. maximum-scale=1 + user-scalable handling.
    let viewportMeta = document.querySelector('meta[name="viewport"]');
    let createdViewport = false;
    const prevViewportContent = viewportMeta ? viewportMeta.getAttribute("content") : null;
    if (!viewportMeta) {
      viewportMeta = document.createElement("meta");
      viewportMeta.name = "viewport";
      document.head.appendChild(viewportMeta);
      createdViewport = true;
    }
    viewportMeta.setAttribute(
      "content",
      "width=device-width, initial-scale=1, maximum-scale=1"
    );

    // Force all text inputs/textareas to >=16px font so iOS Safari does not
    // auto-zoom on focus (the root cause of the stuck-zoom problem)
    const styleEl = document.createElement("style");
    styleEl.setAttribute("data-research-app", "true");
    styleEl.textContent = `
      input[type="text"], input[type="tel"], input[type="email"], input[type="number"], textarea {
        font-size: 16px !important;
      }
    `;
    document.head.appendChild(styleEl);

    // Check URL params for admin mode (query string AND hash)
    // Admin password — change this to your own secret string before sharing the survey link
    const ADMIN_PASSWORD = "yonsei-hci-2026";
    try {
      // Try the query string first (works in preview / direct hosting)
      const params = new URLSearchParams(window.location.search);
      let isAdminParam = params.get("admin") === ADMIN_PASSWORD;

      // Also check the hash (e.g. #admin=...), which sometimes survives iframe embedding
      if (!isAdminParam && window.location.hash) {
        const hash = window.location.hash.replace(/^#/, "");
        const hashParams = new URLSearchParams(hash);
        if (hashParams.get("admin") === ADMIN_PASSWORD) {
          isAdminParam = true;
        }
      }

      // Last resort: try the top-level (parent) URL in case we are inside an iframe
      if (!isAdminParam) {
        try {
          const refUrl = document.referrer || "";
          if (refUrl.includes("admin=" + ADMIN_PASSWORD)) {
            isAdminParam = true;
          }
        } catch (e) {
          // cross-origin referrer access can fail — ignore
        }
      }

      if (isAdminParam) {
        setIsAdmin(true);
      }
    } catch (e) {
      // ignore — fall through to normal survey
    }

    return () => {
      try { document.head.removeChild(link); } catch (e) {}
      try { document.head.removeChild(styleEl); } catch (e) {}
      try {
        if (createdViewport) {
          document.head.removeChild(viewportMeta);
        } else if (prevViewportContent !== null) {
          viewportMeta.setAttribute("content", prevViewportContent);
        }
      } catch (e) {}
    };
  }, []);

  // Scroll to top whenever the step changes (improves UX since long pages
  // would otherwise leave the user mid-scroll when navigating to a new step)
  useEffect(() => {
    try {
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (e) {
      // Fallback for browsers without smooth scroll support
      window.scrollTo(0, 0);
    }
  }, [step]);

  const handleAnswer = (key, value, nextStep, terminate = false) => {
    const updatedAnswers = { ...answers, [key]: value };
    setAnswers(updatedAnswers);

    // If the participant is screened out, record it (fire and forget)
    if (terminate) {
      try {
        const ts = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        const dateStr =
          ts.getFullYear() + pad(ts.getMonth() + 1) + pad(ts.getDate());
        const rand = Math.random().toString(36).substring(2, 6);
        const participantId = `SO_${dateStr}_${rand}`;
        const submission = {
          participantId,
          submittedAt: ts.toISOString(),
          screenedOut: true,
          screenOutStep: key, // "s1" | "s2" | "s3"
          s1: updatedAnswers.s1 ?? null,
          s2: updatedAnswers.s2 ?? null,
          s3: updatedAnswers.s3 ?? null,
        };
        saveResponseToSupabase(participantId, submission).catch((e) => {
          console.error("Failed to save screen-out:", e);
        });
      } catch (e) {
        console.error("Screen-out save error:", e);
      }
    }

    setStep(terminate ? "terminated" : nextStep);
  };

  const goBack = () => {
    if (step === "s2") setStep("s1");
    else if (step === "s3") setStep("s2");
    else if (step === "s1") setStep("consent");
  };

  // Secret admin entry: tap the consent-page title 5 times quickly, then
  // enter the password. This works in any environment (including iframe-
  // embedded public artifacts where URL params may not be readable).
  const tapCountRef = useRef(0);
  const tapTimerRef = useRef(null);
  const handleSecretTap = () => {
    tapCountRef.current += 1;
    if (tapTimerRef.current) clearTimeout(tapTimerRef.current);
    tapTimerRef.current = setTimeout(() => {
      tapCountRef.current = 0;
    }, 1500);
    if (tapCountRef.current >= 5) {
      tapCountRef.current = 0;
      const ADMIN_PASSWORD = "yonsei-hci-2026";
      try {
        const entered = window.prompt("관리자 비밀번호를 입력하세요");
        if (entered === ADMIN_PASSWORD) {
          setIsAdmin(true);
        } else if (entered !== null) {
          window.alert("비밀번호가 올바르지 않습니다.");
        }
      } catch (e) {
        // prompt blocked — ignore
      }
    }
  };

  // Admin view bypasses the survey entirely
  if (isAdmin) {
    return (
      <div
        className="min-h-screen bg-stone-50 text-stone-900"
        style={{ fontFamily: "'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif" }}
      >
        <AdminPage />
      </div>
    );
  }

  return (
    <div
      className="min-h-screen bg-stone-50 text-stone-900"
      style={{ fontFamily: "'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif" }}
    >
      <div className="max-w-md sm:max-w-xl lg:max-w-3xl mx-auto px-5 py-8 sm:py-12">
        {/* Screening progress indicator */}
        {(step === "s1" || step === "s2" || step === "s3") && (
          <div className="flex items-center justify-center gap-2 mb-8">
            <Dot active={step === "s1"} done={step !== "s1"} />
            <div className="h-px w-6 bg-stone-300"></div>
            <Dot active={step === "s2"} done={step === "s3"} />
            <div className="h-px w-6 bg-stone-300"></div>
            <Dot active={step === "s3"} done={false} />
          </div>
        )}

        {/* Main survey progress bar */}
        {(step === "a" || step === "b" || step === "c" || step === "d" || step === "e") && (
          <div className="mb-8">
            <div className="flex items-center justify-between mb-2 text-xs text-stone-500">
              <span>회상 단계</span>
              <span>
                {step === "a" && "1 / 5"}
                {step === "b" && "2 / 5"}
                {step === "c" && "3 / 5"}
                {step === "d" && "4 / 5"}
                {step === "e" && "5 / 5"}
              </span>
            </div>
            <div className="h-1 bg-stone-200 rounded-full overflow-hidden">
              <div
                className="h-full bg-indigo-600 transition-all duration-500"
                style={{
                  width:
                    step === "a"
                      ? "20%"
                      : step === "b"
                      ? "40%"
                      : step === "c"
                      ? "60%"
                      : step === "d"
                      ? "80%"
                      : "100%",
                }}
              ></div>
            </div>
          </div>
        )}

        {/* Reveal section progress bar */}
        {(step === "f" || step === "g" || step === "h" || step === "i") && (
          <div className="mb-8">
            <div className="flex items-center justify-between mb-2 text-xs text-stone-500">
              <span>마지막 단계</span>
              <span>
                {step === "f" && "1 / 4"}
                {step === "g" && "2 / 4"}
                {step === "h" && "3 / 4"}
                {step === "i" && "4 / 4"}
              </span>
            </div>
            <div className="h-1 bg-stone-200 rounded-full overflow-hidden">
              <div
                className="h-full bg-amber-600 transition-all duration-500"
                style={{
                  width:
                    step === "f"
                      ? "25%"
                      : step === "g"
                      ? "50%"
                      : step === "h"
                      ? "75%"
                      : "100%",
                }}
              ></div>
            </div>
          </div>
        )}

        {/* Pages */}
        {step === "consent" && <ConsentPage onNext={() => setStep("s1")} onSecretTap={handleSecretTap} />}

        {step === "s1" && (
          <ScreeningQuestion
            stepLabel="질문 1 / 3"
            question="최근 1개월 내에 ChatGPT, Claude, Gemini 같은 AI 챗봇을 사용해 무언가를 결정하거나 선택하는 데 도움을 받은 적이 있나요?"
            hint="고민되는 상황에 어떤 선택을 할 지 결정하는 데 도움을 받은 순간을 의미합니다. 어떤 제품을 살지, 어떻게 답장할지, 어디 갈지 등 작은 결정도 포함됩니다. 단순 번역·검색 등은 해당하지 않습니다."
            options={[
              { value: "yes", label: "네, 있습니다", terminate: false },
              { value: "no", label: "아니오, 없습니다", terminate: true },
              { value: "unsure", label: "잘 모르겠습니다", terminate: true },
            ]}
            onAnswer={(v, t) => handleAnswer("s1", v, "s2", t)}
            onBack={goBack}
          />
        )}

        {step === "s2" && (
          <ScreeningQuestion
            stepLabel="질문 2 / 3"
            question="가장 최근에 AI와 결정을 내리기 위한 대화를 한 것은 언제인가요?"
            hint={null}
            options={[
              { value: "today", label: "오늘 또는 어제", terminate: false },
              { value: "2-3days", label: "2~3일 전", terminate: false },
              { value: "4-7days", label: "4~7일 전", terminate: false },
              { value: "1-2weeks", label: "1~2주 전", terminate: false },
              { value: "older", label: "2주 이전", terminate: false },
            ]}
            onAnswer={(v, t) => handleAnswer("s2", v, "s3", t)}
            onBack={goBack}
          />
        )}

        {step === "s3" && (
          <ScreeningQuestion
            stepLabel="질문 3 / 3"
            question="해당 대화 기록을 지금 열어서 확인할 수 있나요?"
            hint="잠시 ChatGPT, Claude, Gemini 등 사용하시는 AI를 열어서 확인해보세요. 로그인 된 같은 기기/계정이라면 사이드바에 기록이 남아있습니다."
            options={[
              { value: "yes", label: "네, 지금 열어볼 수 있습니다", terminate: false },
              { value: "no", label: "아니오, 기록이 없거나 로그인이 안 된 상태입니다", terminate: true },
            ]}
            onAnswer={(v, t) => handleAnswer("s3", v, "passed", t)}
            onBack={goBack}
          />
        )}

        {step === "passed" && <PassedPage onNext={() => setStep("a")} />}
        {step === "a" && (
          <PageA
            onNext={(data) => {
              setAnswers({ ...answers, ...data });
              setStep("b");
            }}
            onBack={() => setStep("passed")}
          />
        )}
        {step === "b" && (
          <PageB
            onNext={() => setStep("c")}
            onBack={() => setStep("a")}
          />
        )}
        {step === "c" && (
          <PageC
            onNext={(data) => {
              setAnswers({ ...answers, ...data });
              setStep("d");
            }}
            onBack={() => setStep("b")}
          />
        )}
        {step === "d" && (
          <PageD
            onNext={(data) => {
              setAnswers({ ...answers, ...data });
              setStep("e");
            }}
            onBack={() => setStep("c")}
          />
        )}
        {step === "e" && (
          <PageE
            onNext={(data) => {
              setAnswers({ ...answers, ...data });
              setStep("f");
            }}
            onBack={() => setStep("d")}
          />
        )}
        {step === "f" && (
          <PageF
            onNext={() => setStep("g")}
            onBack={() => setStep("e")}
          />
        )}
        {step === "g" && (
          <PageG
            onNext={(data) => {
              setAnswers({ ...answers, ...data });
              setStep("h");
            }}
            onBack={() => setStep("f")}
          />
        )}
        {step === "h" && (
          <PageH
            onNext={(data) => {
              setAnswers({ ...answers, ...data });
              setStep("i");
            }}
            onBack={() => setStep("g")}
          />
        )}
        {step === "i" && (
          <PageI
            onNext={(data) => {
              const finalAnswers = { ...answers, ...data };
              // Generate participant ID
              const ts = new Date();
              const pad = (n) => String(n).padStart(2, "0");
              const dateStr =
                ts.getFullYear() +
                pad(ts.getMonth() + 1) +
                pad(ts.getDate());
              const rand = Math.random().toString(36).substring(2, 6);
              const participantId = `${dateStr}_${rand}`;
              const submission = {
                participantId,
                submittedAt: ts.toISOString(),
                screenedOut: false,
                ...finalAnswers,
              };
              setAnswers(submission);

              // Move to complete page IMMEDIATELY — saving must never block this
              setStep("complete");

              // Persist to Supabase in the background (fire and forget)
              try {
                saveResponseToSupabase(participantId, submission).catch((e) => {
                  console.error("Failed to save response:", e);
                });
              } catch (e) {
                console.error("Save error:", e);
              }
            }}
            onBack={() => setStep("h")}
            allAnswers={answers}
          />
        )}
        {step === "complete" && <CompletePage answers={answers} />}
        {step === "terminated" && <TerminatedPage />}
      </div>
    </div>
  );
}

function Dot({ active, done }) {
  return (
    <div
      className={
        "rounded-full transition-all duration-300 " +
        (active
          ? "w-3 h-3 bg-indigo-600"
          : done
          ? "w-2 h-2 bg-indigo-300"
          : "w-2 h-2 bg-stone-300")
      }
    ></div>
  );
}

function ConsentPage({ onNext, onSecretTap }) {
  return (
    <div className="bg-white rounded-3xl border border-stone-200 p-7 sm:p-9 lg:p-11 shadow-sm">
      <div className="flex items-center gap-2 mb-1">
        <Sparkles className="w-4 h-4 text-indigo-500" />
        <span className="text-xs tracking-wider text-indigo-600 font-medium uppercase">
          Research Study
        </span>
      </div>
      <h1
        onClick={onSecretTap}
        className="text-2xl sm:text-3xl font-semibold mt-3 mb-2 leading-tight"
      >
        AI 챗봇 사용 회고 연구
      </h1>
      <p className="text-stone-600 text-sm sm:text-base leading-relaxed mb-7">
        안녕하세요, 연구에 참여해 주셔서 감사합니다! 본 연구는 연세대학교
        정보대학원에서 진행되며, 최근 LLM과 나눈 대화를 회고하는 설문 형태로
        진행됩니다.
      </p>

      <div className="space-y-3 mb-8">
        <InfoRow icon="⏱️" label="소요 시간" value="약 12~15분" />
        <InfoRow icon="📱" label="필요한 것" value="본인의 최근 ChatGPT/Claude/Gemini 대화 1건" />
        <InfoRow

function ScreeningQuestion({ stepLabel, question, hint, options, onAnswer, onBack }) {
  const [selected, setSelected] = useState(null);

  const handleNext = () => {
    if (!selected) return;
    const opt = options.find((o) => o.value === selected);
    onAnswer(selected, opt.terminate);
  };

  return (
    <div className="bg-white rounded-3xl border border-stone-200 p-7 sm:p-9 lg:p-11 shadow-sm">
      <button
        onClick={onBack}
        className="flex items-center gap-1 text-stone-400 hover:text-stone-600 text-sm mb-5 transition-colors"

        <ArrowLeft className="w-3 h-3" />

      <p className="text-xs tracking-wider text-indigo-600 font-medium uppercase mb-3">
        {stepLabel}
      </p>
      <h2 className="text-xl sm:text-2xl lg:text-3xl font-semibold leading-snug mb-3">
        {question}
      </h2>
      {hint && (
        <p className="text-sm text-stone-500 leading-relaxed mb-6">{hint}</p>
      )}

      <div className="space-y-2 mb-7 mt-6">
        {options.map((opt) => (
          <button
            key={opt.value}
            onClick={() => setSelected(opt.value)}
            className={
              "w-full text-left px-5 py-4 rounded-2xl border transition-all text-sm sm:text-base " +
              (selected === opt.value
                ? "border-indigo-500 bg-indigo-50 text-indigo-900"
                : "border-stone-200 bg-white text-stone-700 hover:border-stone-300 hover:bg-stone-50")
            }
          >
            <div className="flex items-center gap-3">
              <div
                className={
                  "w-4 h-4 rounded-full border-2 flex-shrink-0 transition-all " +
                  (selected === opt.value
                    ? "border-indigo-600 bg-indigo-600"

                  <div className="w-1.5 h-1.5 bg-white rounded-full m-auto mt-0.5"></div>

              <span className="flex-1">{opt.label}</span>

      <button
        onClick={handleNext}

          (selected

const CSV_COLUMNS = [

  "s1", "s2", "s3",
  // Page A — usage + SoAS

  // Page C — own message recall
  "decisionDescription",
  "q4_promptRecall",
  "q5_promptContentEstimate",
  // Page D — AI first response recall
  "aiFirstResponseRecall",
  "q3a_priority",
  "q3b_consistency",
  "q5b_confirmationSeekingAwareness",
  // Page E — final decision
  "finalVsFirstResponse",
  "q1_decisionAutonomy",
  "q2_contributionAI",
  "q3c_exclusivity",
  // Page G — micro-coding
  "pair1_user", "pair1_ai", "pair1_label",
  "pair2_user", "pair2_ai", "pair2_label",
  "overallRestateEstimate",
  // Page H — post-reveal
  "post_q5_promptContentEstimate",
  "post_q3a_priority",
  "post_q3b_consistency",

  // Page I — reflection + demographics
  "reflection",
  "futureIntent",
  "ageGroup",
  "gender",
  "contactForGift",
];

function flattenResponse(r) {
  const flat = { ...r };
  // SoAS keys
  if (r.soas) {
    for (let i = 1; i <= 5; i++) flat[`soas_${i}`] = r.soas[i] ?? "";
  }
  // Micro-coding pairs
  if (r.pair1) {
    flat.pair1_user = r.pair1.user ?? "";
    flat.pair1_ai = r.pair1.ai ?? "";
    flat.pair1_label = r.pair1.label ?? "";
  }
  if (r.pair2) {
    flat.pair2_user = r.pair2.user ?? "";
    flat.pair2_ai = r.pair2.ai ?? "";
    flat.pair2_label = r.pair2.label ?? "";
  }
  return flat;
}

function escapeCSV(val) {
  if (val === null || val === undefined) return "";
  const s = String(val);
  if (s.includes(",") || s.includes('"') || s.includes("\n") || s.includes("\r")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function responsesToCSV(responses) {
  const header = CSV_COLUMNS.join(",");
  const rows = responses.map((r) => {
    const flat = flattenResponse(r);
    return CSV_COLUMNS.map((col) => escapeCSV(flat[col])).join(",");
  });
  return [header, ...rows].join("\n");
}

function AdminPage() {
  const [responses, setResponses] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selectedId, setSelectedId] = useState(null);

  const loadResponses = async () => {
    setLoading(true);
    setError(null);
    try {
      const loaded = await loadResponsesFromSupabase();
      // Sort by submission time descending (newest first)
      loaded.sort((a, b) => {
        const ta = new Date(a.submittedAt || 0).getTime();
        const tb = new Date(b.submittedAt || 0).getTime();
        return tb - ta;
      });
      setResponses(loaded);
    } catch (e) {
      setError(String(e));
    }
    setLoading(false);
  };

  useEffect(() => {
    loadResponses();
  }, []);

  const handleDownloadCSV = () => {
    const csv = responsesToCSV(responses);
    const bom = "\uFEFF"; // UTF-8 BOM for Excel Korean compatibility
    const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const ts = new Date().toISOString().slice(0, 10).replace(/-/g, "");
    a.download = `research_responses_${ts}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const selected = responses.find((r) => r.participantId === selectedId);

  return (

function ResponseRow({ response, onClick }) {
  const r = response;
  const submitted = r.submittedAt
    ? new Date(r.submittedAt).toLocaleString("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      })
    : "?";
  const decision = r.decisionDescription || "(미입력)";
  const deltaPromptEst =
    r.post_q5_promptContentEstimate !== undefined &&
    r.q5_promptContentEstimate !== undefined
      ? r.post_q5_promptContentEstimate - r.q5_promptContentEstimate
      : null;
  const deltaContributionAI =
    r.post_q2_contributionAI !== undefined && r.q2_contributionAI !== undefined
      ? r.post_q2_contributionAI - r.q2_contributionAI
      : null;

  return (
    <button
      onClick={onClick}
      className="w-full text-left bg-stone-50 hover:bg-stone-100 border border-stone-200 rounded-2xl p-4 transition-colors"
    >
      <div className="flex items-center justify-between gap-3 mb-2 flex-wrap">
        <div className="flex items-center gap-2">
          <code className="text-xs font-mono text-stone-500">
            {r.participantId}
          </code>
          <span className="text-xs text-stone-400">·</span>
          <span className="text-xs text-stone-500">{submitted}</span>
        </div>
        <Eye className="w-4 h-4 text-stone-400" />
      </div>
      <p className="text-sm text-stone-800 mb-2 line-clamp-1">
        {decision.length > 60 ? decision.substring(0, 60) + "..." : decision}
      </p>
      <div className="flex gap-2 flex-wrap">
        {deltaPromptEst !== null && (
          <Pill
            label={`Δ프롬프트인식 ${deltaPromptEst > 0 ? "+" : ""}${deltaPromptEst}`}
            color={
              deltaPromptEst > 10
                ? "amber"
                : deltaPromptEst < -10
                ? "blue"
                : "stone"
            }
          />
        )}
        {deltaContributionAI !== null && (
          <Pill
            label={`ΔAI기여 ${deltaContributionAI > 0 ? "+" : ""}${deltaContributionAI}`}
            color={
              deltaContributionAI > 10
                ? "amber"
                : deltaContributionAI < -10
                ? "blue"
                : "stone"
            }
          />
        )}
        {r.pair1?.label && r.pair2?.label && (
          <Pill
            label={`${r.pair1.label}·${r.pair2.label}`}
            color="indigo"
          />
        )}
      </div>
    </button>
  );
}

function Pill({ label, color }) {
  const colors = {
    stone: "bg-stone-100 text-stone-600",
    indigo: "bg-indigo-50 text-indigo-700",
    amber: "bg-amber-50 text-amber-700",
    blue: "bg-blue-50 text-blue-700",
  };
  return (
    <span
      className={
        "inline-block text-xs px-2 py-1 rounded-md font-mono " +
        (colors[color] || colors.stone)
      }
    >
      {label}
    </span>
  );
}

function ResponseDetail({ response, onClose }) {
  const r = response;
  return (
    <div
      style={{
        position: "fixed",
        top: 0,
        left: 0,
        right: 0,
        bottom: 0,
        backgroundColor: "rgba(0,0,0,0.5)",
        zIndex: 50,
        overflowY: "auto",
        padding: "1.5rem",
      }}
      onClick={onClose}
    >
      <div
        className="max-w-2xl mx-auto bg-white rounded-3xl border border-stone-200 p-6 sm:p-8 shadow-lg"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="flex items-center justify-between mb-6">
          <div>
            <code className="text-sm font-mono text-stone-500">
              {r.participantId}
            </code>
            <p className="text-xs text-stone-400 mt-1">
              제출: {new Date(r.submittedAt).toLocaleString("ko-KR")}
            </p>
          </div>
          <button
            onClick={onClose}
            className="w-8 h-8 rounded-full hover:bg-stone-100 flex items-center justify-center"
          >
            <X className="w-4 h-4" />
          </button>
        </div>

        <DetailSection title="스크리닝">
          <DetailRow k="S1 (사용 경험)" v={r.s1} />
          <DetailRow k="S2 (최근 시점)" v={r.s2} />
          <DetailRow k="S3 (기록 접근)" v={r.s3} />
        </DetailSection>

        <DetailSection title="평소 AI 사용">
          <DetailRow k="사용 빈도" v={r.usageFreq} />
          {r.soas && (
            <DetailRow
              k="SoAS (5문항)"
              v={[1, 2, 3, 4, 5]
                .map((i) => r.soas[i] ?? "?")
                .join(" / ")}
            />
          )}
        </DetailSection>

        <DetailSection title="결정 및 본인 메시지 (Pre-reveal)">
          <DetailRow k="결정 내용" v={r.decisionDescription} long />
          <DetailRow k="첫 메시지 회상" v={r.q4_promptRecall} long />
          <DetailRow
            k="Q5 정보 함량 (0-100)"
            v={r.q5_promptContentEstimate}
          />
        </DetailSection>

        <DetailSection title="AI 첫 응답 (Pre-reveal)">
          <DetailRow k="AI 응답 회상" v={r.aiFirstResponseRecall} long />
          <DetailRow k="Q3a 사전 방향성 (1-7)" v={r.q3a_priority} />
          <DetailRow k="Q3b AI 응답 일치도 (1-7)" v={r.q3b_consistency} />
          <DetailRow
            k="Q5b 평소 사용 패턴 (1-7)"
            v={r.q5b_confirmationSeekingAwareness}
            note="1=확인용, 7=정보 얻기"
          />
        </DetailSection>

        <DetailSection title="최종 결정 (Pre-reveal)">
          <DetailRow k="첫응답 vs 최종" v={r.finalVsFirstResponse} />
          <DetailRow k="Q1 자율성 (0-100)" v={r.q1_decisionAutonomy} />
          <DetailRow
            k="Q2 AI 기여 % (0-100)"
            v={r.q2_contributionAI}
          />
          <DetailRow k="Q3c AI 외 영향 (1-7)" v={r.q3c_exclusivity} />
        </DetailSection>

        <DetailSection title="마이크로 코딩">
          {r.pair1 && (
            <>
              <DetailRow k="페어 1 — 본인" v={r.pair1.user} long />
              <DetailRow k="페어 1 — AI" v={r.pair1.ai} long />
              <DetailRow k="페어 1 — 분류" v={r.pair1.label} />
            </>
          )}
          {r.pair2 && (
            <>
              <DetailRow k="페어 2 — 본인" v={r.pair2.user} long />
              <DetailRow k="페어 2 — AI" v={r.pair2.ai} long />
              <DetailRow k="페어 2 — 분류" v={r.pair2.label} />
            </>
          )}
          <DetailRow
            k="전체 재진술 비중 (0-100)"
            v={r.overallRestateEstimate}
            note="0=새정보, 100=재진술"
          />
        </DetailSection>

        <DetailSection title="Post-reveal 재측정">
          <DetailRow
            k="정보 함량 (Δ)"
            v={`${r.q5_promptContentEstimate} → ${r.post_q5_promptContentEstimate}`}
          />
          <DetailRow
            k="사전 방향성 (Δ)"
            v={`${r.q3a_priority} → ${r.post_q3a_priority}`}
          />
          <DetailRow
            k="AI 응답 일치도 (Δ)"
            v={`${r.q3b_consistency} → ${r.post_q3b_consistency}`}
          />
          <DetailRow
            k="결정 자율성 (Δ)"
            v={`${r.q1_decisionAutonomy} → ${r.post_q1_decisionAutonomy}`}
          />
          <DetailRow
            k="AI 기여 % (Δ)"
            v={`${r.q2_contributionAI} → ${r.post_q2_contributionAI}`}
          />
          <DetailRow
            k="AI 외 영향 (Δ)"
            v={`${r.q3c_exclusivity} → ${r.post_q3c_exclusivity}`}
          />
        </DetailSection>

        <DetailSection title="마무리">
          <DetailRow k="자유 응답" v={r.reflection} long />
          <DetailRow k="향후 사용 의도" v={r.futureIntent} long />
          <DetailRow k="연령대" v={r.ageGroup} />
          <DetailRow k="성별" v={r.gender} />
          <DetailRow k="연락처" v={r.contactForGift} />
        </DetailSection>
      </div>
    </div>
  );
}

function DetailSection({ title, children }) {
  return (
    <div className="mb-5 last:mb-0">
      <p className="text-xs tracking-wider text-stone-400 font-medium uppercase mb-2 pb-1 border-b border-stone-100">
        {title}
      </p>
      <div className="space-y-1.5">{children}</div>
    </div>
  );
}

function DetailRow({ k, v, long, note }) {
  if (v === undefined || v === null || v === "") {
    return (
      <div className="flex items-start gap-3 text-sm">
        <span className="text-stone-500 flex-shrink-0 min-w-[140px]">{k}</span>
        <span className="text-stone-300 italic">—</span>
      </div>
    );
  }
  if (long) {
    return (
      <div className="text-sm">
        <p className="text-stone-500 mb-1">{k}</p>
        <p className="text-stone-800 leading-relaxed bg-stone-50 rounded-lg p-2.5 whitespace-pre-wrap">
          {v}
        </p>
      </div>
    );
  }
  return (
    <div className="flex items-start gap-3 text-sm">
      <span className="text-stone-500 flex-shrink-0 min-w-[140px]">{k}</span>
      <span className="text-stone-800 font-medium">{String(v)}</span>
      {note && (
        <span className="text-xs text-stone-400 italic">{note}</span>
      )}
    </div>
  );
}


const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(React.createElement(ResearchApp));
  </script>
</body>
</html>
