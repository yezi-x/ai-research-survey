<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ===== 페이지 제목 ===== -->
  <title>AI 챗봇 사용 회상 연구</title>

  <!-- ===== 카카오톡 / SNS 미리보기 메타태그 (Open Graph) ===== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AI 챗봇 사용 회상 연구" />
  <meta property="og:description" content="최근 AI와 나눈 대화를 떠올려보는 짧은 설문입니다. 완료 시 투썸 커피 기프티콘을 드립니다." />
  <!-- 썸네일 이미지: thumbnail.png 파일을 이 index.html과 같은 폴더에 함께 업로드하세요 -->
  <meta property="og:image" content="thumbnail.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- 트위터/기타 호환 -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AI 챗봇 사용 회상 연구" />
  <meta name="twitter:description" content="최근 AI와 나눈 대화를 떠올려보는 짧은 설문입니다. 완료 시 투썸 커피 기프티콘을 드립니다." />
  <meta name="twitter:image" content="thumbnail.png" />

  <!-- Pretendard 폰트 (설문 앱과 동일) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    :root {
      --stone-50: #fafaf9;
      --stone-100: #f5f5f4;
      --stone-200: #e7e5e4;
      --stone-500: #78716c;
      --stone-600: #57534e;
      --stone-800: #292524;
      --amber-50: #fffbeb;
      --amber-100: #fef3c7;
      --amber-700: #b45309;
      --indigo-600: #4f46e5;
      --indigo-700: #4338ca;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background: var(--stone-50);
      color: var(--stone-800);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(180, 83, 9, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.04) 0%, transparent 40%),
        var(--stone-50);
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border: 1px solid var(--stone-200);
      border-radius: 28px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
      animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber-700);
      font-weight: 600;
      background: var(--amber-50);
      border: 1px solid var(--amber-100);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .intro {
      font-size: 15px;
      line-height: 1.8;
      color: var(--stone-600);
      margin-bottom: 28px;
    }

    .info {
      background: var(--stone-50);
      border: 1px solid var(--stone-100);
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 28px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--stone-600);
      padding: 7px 0;
    }
    .info-row .icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .info-row strong {
      color: var(--stone-800);
      font-weight: 600;
    }

    .start-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--indigo-600);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 16px;
      padding: 17px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .start-btn:hover { background: var(--indigo-700); }
    .start-btn:active { transform: scale(0.985); }
    .start-btn .arrow { transition: transform 0.2s; }
    .start-btn:hover .arrow { transform: translateX(3px); }

    .footnote {
      text-align: center;
      font-size: 12px;
      color: var(--stone-500);
      margin-top: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">연세대학교 정보대학원 연구</span>
    <h1>AI 챗봇 사용 회상 연구</h1>
    <p class="intro">
      최근 ChatGPT, Claude, Gemini 같은 AI와 무언가를 결정하기 위해 나눈
      대화를 떠올려보는 짧은 설문입니다. 끝까지 참여해주시면 큰 도움이 됩니다.
    </p>

    <div class="info">
      <div class="info-row">
        <span class="icon">⏱️</span>
        <span>약 <strong>12~15분</strong> 소요</span>
      </div>
      <div class="info-row">
        <span class="icon">📱</span>
        <span>본인의 최근 <strong>AI 대화 1건</strong> 필요</span>
      </div>
      <div class="info-row">
        <span class="icon">🎁</span>
        <span>완료 시 <strong>투썸 커피 기프티콘</strong></span>
      </div>
    </div>

    <a class="start-btn" href="https://claude.ai/public/artifacts/202c30bc-2736-4f92-bda3-ade128085ddd" target="_blank" rel="noopener noreferrer">
      설문 시작하기
      <span class="arrow">→</span>
    </a>

    <p class="footnote">
      자발적 참여이며 언제든 중단하실 수 있습니다.
    </p>
  </div>
</body>
</html>
